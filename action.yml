name: Setup WARP
description: Global WARP (WireGuard) + ip rule from LAN for live logs + warp-rotate

runs:
  using: composite
  steps:
    - shell: bash
      run: |
        set -e
        export DEBIAN_FRONTEND=noninteractive NEEDRESTART_SUSPEND=1

        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends wireguard-tools iproute2 curl

        LAN=$(ip route get 192.168.193.10 | grep -oP 'src \K\S+')
        sudo tee /etc/wireguard/warp.conf >/dev/null <<EOF
        [Interface]
        PrivateKey = cKE7LmCF61IhqqABGhvJ44jWXp8fKymcMAEVAzbDF2k=
        Address = 172.16.0.2/32, fd01:5ca1:ab1e:823e:e094:eb1c:ff87:1fab/128
        PostUp = ip -4 rule add from $LAN lookup main
        PostDown = ip -4 rule delete from $LAN lookup main
        DNS = 1.1.1.1,8.8.8.8,8.8.4.4
        MTU = 1280

        [Peer]
        PublicKey = bmXOC+F1FxEMF9dyiK2H5/1SUtzH0JuVo51h2wPfgyo=
        AllowedIPs = 0.0.0.0/0, ::/0
        Endpoint = engage.cloudflareclient.com:2408
        EOF
        sudo sed -i 's/^[ ]\+//g' /etc/wireguard/warp.conf

        connected=0
        for attempt in $(seq 1 8); do
          sudo wg-quick down warp 2>/dev/null || true
          sudo wg-quick up warp
          for i in $(seq 1 15); do
            if sudo wg show warp latest-handshakes 2>/dev/null | grep -qE '[1-9][0-9]*'; then
              connected=1
              break
            fi
            sleep 1
          done
          [ "$connected" -eq 1 ] && break
          sleep $((attempt * 2))
        done
        [ "$connected" -eq 1 ] || { echo "WARP connect failed"; exit 1; }

        sleep 3
        echo "IP: $(curl -4 -sf --connect-timeout 8 https://cloudflare.com/cdn-cgi/trace | grep '^ip=' | cut -d= -f2)"

        printf '%s\n' \
          '#!/bin/bash' \
          'set -e' \
          'sudo wg-quick down warp 2>/dev/null || true' \
          'sleep 2' \
          'sudo wg-quick up warp' \
          'sleep 3' \
          | sudo tee /usr/local/bin/warp-rotate >/dev/null
        sudo chmod +x /usr/local/bin/warp-rotate
